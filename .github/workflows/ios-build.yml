name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "icons/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Upload to TestFlight"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "15.4"
  SCHEME: ShotTracker
  CONFIGURATION: Release
  BUNDLE_ID: com.basketballtracker.app

jobs:
  build:
    name: Build & test (unsigned)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install tooling
        run: brew install xcodegen librsvg xcbeautify

      - name: Generate app icon from SVG
        run: |
          rsvg-convert -w 1024 -h 1024 icons/icon.svg \
            -o ios/ShotTracker/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png

      - name: Generate Xcode project
        working-directory: ios
        run: |
          xcodegen version
          xcodegen generate --spec project.yml
          echo "--- generated contents ---"
          ls -la
          test -d ShotTracker.xcodeproj || { echo "::error::xcodegen did not produce ShotTracker.xcodeproj"; exit 1; }

      - name: Build (no signing)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project ShotTracker.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | xcbeautify

      - name: Run unit tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project ShotTracker.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            test 2>&1 | xcbeautify

  testflight:
    name: Archive & upload to TestFlight
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == 'true'
    runs-on: macos-14
    timeout-minutes: 30
    environment: testflight
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install tooling
        run: brew install xcodegen librsvg xcbeautify

      - name: Generate app icon from SVG
        run: |
          rsvg-convert -w 1024 -h 1024 icons/icon.svg \
            -o ios/ShotTracker/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png

      - name: Generate Xcode project
        working-directory: ios
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: xcodegen generate

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Write ExportOptions.plist
        working-directory: ios
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project ShotTracker.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/ShotTracker.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive 2>&1 | xcbeautify

      - name: Export IPA
        working-directory: ios
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/ShotTracker.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ios/build/export/ShotTracker.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
