name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "icons/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: ShotTracker
  BUNDLE_ID: com.aishottracker.app

jobs:
  build:
    name: Build & test (simulator, unsigned)
    runs-on: macos-15
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        # XcodeGen 2.45+ emits objectVersion 77 (Xcode 16 format), so macos-14 / Xcode 15.x fails
        # with "Unable to read project". Xcode 16.2 fails differently: its bundled iOS SDK
        # (build 22C146) doesn't match any simulator runtime preinstalled on macos-15.
        # 16.4 ships an iOS 18.4/18.5 SDK that lines up with runtimes the runner actually has.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Show Xcode + runtime info
        working-directory: .
        run: |
          xcodebuild -version
          echo "--- iOS simulator runtimes ---"
          xcrun simctl list runtimes | grep -i iOS || true

      - name: Install tooling
        working-directory: .
        run: brew install xcodegen librsvg xcbeautify

      - name: Generate app icon from SVG
        working-directory: .
        run: |
          rsvg-convert -w 1024 -h 1024 icons/icon.svg \
            -o ios/ShotTracker/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png

      - name: Generate Xcode project
        run: |
          xcodegen version
          xcodegen generate --spec project.yml
          xcodebuild -project ShotTracker.xcodeproj -list

      - name: Build (simulator, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ShotTracker.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | xcbeautify

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ShotTracker.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | xcbeautify
