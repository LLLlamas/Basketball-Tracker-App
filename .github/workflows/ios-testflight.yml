name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: ios-testflight
  cancel-in-progress: false

env:
  SCHEME: ShotTracker
  CONFIGURATION: Release
  BUNDLE_ID: com.aishottracker.app

jobs:
  testflight:
    name: Archive & upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 40
    environment: testflight
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Install tooling
        working-directory: .
        run: brew install xcodegen librsvg xcbeautify

      - name: Generate app icon from SVG
        working-directory: .
        run: |
          rsvg-convert -w 1024 -h 1024 icons/icon.svg \
            -o ios/ShotTracker/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png

      - name: Generate Xcode project
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: xcodegen generate

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install App Store Connect API key
        working-directory: .
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          echo "Wrote key: $(ls -la ~/.appstoreconnect/private_keys/)"

      - name: Write ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive (auto-creates provisioning profile if missing)
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ShotTracker.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/ShotTracker.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8" \
            -authenticationKeyID "$APPSTORE_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            2>&1 | xcbeautify

      - name: Export IPA
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/ShotTracker.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8" \
            -authenticationKeyID "$APPSTORE_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ios/build/export/ShotTracker.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ShotTracker-ipa
          path: ios/build/export/*.ipa
          if-no-files-found: ignore
