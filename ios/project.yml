name: ShotTracker
options:
  bundleIdPrefix: com.aishottracker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"       # iPhone only
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"
    ENABLE_BITCODE: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  ShotTracker:
    type: application
    platform: iOS
    sources:
      - path: ShotTracker
    resources:
      - path: ShotTracker/Assets.xcassets
    info:
      path: ShotTracker/Info.plist
      properties:
        CFBundleDisplayName: Shot Tracker
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: "Shot Tracker uses the camera to automatically track your makes and misses while you shoot hoops."
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aishottracker.app
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  ShotTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ShotTrackerTests
    dependencies:
      - target: ShotTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aishottracker.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ShotTracker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ShotTracker"

schemes:
  ShotTracker:
    build:
      targets:
        ShotTracker: all
        ShotTrackerTests: [test]
    test:
      targets:
        - ShotTrackerTests
